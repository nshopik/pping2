name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  LIBTINS_VERSION: v4.5

jobs:
  # Debian 12 and 13 builds run inside distro containers for ABI accuracy.
  # Steps run as root inside the container — no sudo needed.
  build-debian:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian12
            image: debian:bookworm
            runner: ubuntu-24.04
            arch: amd64
            tarball: true
          - distro: debian12
            image: debian:bookworm
            runner: ubuntu-24.04-arm
            arch: arm64
            tarball: true
          - distro: debian13
            image: debian:trixie
            runner: ubuntu-24.04
            arch: amd64
            tarball: false
          - distro: debian13
            image: debian:trixie
            runner: ubuntu-24.04-arm
            arch: arm64
            tarball: false
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential cmake libpcap-dev libssl-dev \
            pkg-config git ca-certificates dpkg-dev libcap2-bin

      - name: Set version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cache libtins
        id: cache-libtins
        uses: actions/cache@v4
        with:
          path: .libtins
          key: libtins-${{ env.LIBTINS_VERSION }}-${{ matrix.distro }}-${{ matrix.arch }}

      - name: Build libtins
        if: steps.cache-libtins.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch "$LIBTINS_VERSION" \
            https://github.com/mfontanini/libtins.git /tmp/libtins-src
          cmake -S /tmp/libtins-src -B /tmp/libtins-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBTINS_ENABLE_PCAP=1 \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/.libtins"
          cmake --build /tmp/libtins-build --parallel "$(nproc)"
          cmake --install /tmp/libtins-build

      - name: Build pping2
        run: make LIBTINS="${GITHUB_WORKSPACE}/.libtins"

      - name: Stage install
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          ARCH: ${{ matrix.arch }}
        run: |
          PKGDIR=$(mktemp -d)
          make install-all DESTDIR="$PKGDIR" PREFIX=/usr SYSCONFDIR=/etc
          mkdir "$PKGDIR/DEBIAN"
          sed \
            -e "s/^Version: .*/Version: ${VERSION}/" \
            -e "s/^Architecture: .*/Architecture: ${ARCH}/" \
            packaging/debian/control > "$PKGDIR/DEBIAN/control"
          install -m 0755 packaging/debian/postinst "$PKGDIR/DEBIAN/postinst"
          install -m 0755 packaging/debian/prerm    "$PKGDIR/DEBIAN/prerm"
          cp packaging/debian/conffiles             "$PKGDIR/DEBIAN/conffiles"
          dpkg-deb --build "$PKGDIR" \
            "pping2_${VERSION}_${{ matrix.distro }}_${ARCH}.deb"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.distro }}-${{ matrix.arch }}
          path: pping2_*.deb

      - name: Build tarball
        if: matrix.tarball
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          ARCH: ${{ matrix.arch }}
        run: |
          STAGING="pping2-${VERSION}-linux-${ARCH}"
          mkdir "$STAGING"
          cp pping2 Makefile README.md clickhouse.md LICENSE "$STAGING/"
          cp -r contrib "$STAGING/"
          tar czf "pping2-${VERSION}-linux-${ARCH}.tar.gz" "$STAGING"

      - name: Upload tarball
        if: matrix.tarball
        uses: actions/upload-artifact@v4
        with:
          name: tarball-linux-${{ matrix.arch }}
          path: pping2-*-linux-*.tar.gz

  # Ubuntu 24.04 builds run natively (no container). Uses sudo.
  build-ubuntu:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libpcap-dev libssl-dev \
            pkg-config git ca-certificates dpkg-dev libcap2-bin

      - name: Set version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cache libtins
        id: cache-libtins
        uses: actions/cache@v4
        with:
          path: .libtins
          key: libtins-${{ env.LIBTINS_VERSION }}-ubuntu2404-${{ matrix.arch }}

      - name: Build libtins
        if: steps.cache-libtins.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch "$LIBTINS_VERSION" \
            https://github.com/mfontanini/libtins.git /tmp/libtins-src
          cmake -S /tmp/libtins-src -B /tmp/libtins-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBTINS_ENABLE_PCAP=1 \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/.libtins"
          cmake --build /tmp/libtins-build --parallel "$(nproc)"
          cmake --install /tmp/libtins-build

      - name: Build pping2
        run: make LIBTINS="${GITHUB_WORKSPACE}/.libtins"

      - name: Stage install and build .deb
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          ARCH: ${{ matrix.arch }}
        run: |
          PKGDIR=$(mktemp -d)
          make install-all DESTDIR="$PKGDIR" PREFIX=/usr SYSCONFDIR=/etc
          mkdir "$PKGDIR/DEBIAN"
          sed \
            -e "s/^Version: .*/Version: ${VERSION}/" \
            -e "s/^Architecture: .*/Architecture: ${ARCH}/" \
            packaging/debian/control > "$PKGDIR/DEBIAN/control"
          install -m 0755 packaging/debian/postinst "$PKGDIR/DEBIAN/postinst"
          install -m 0755 packaging/debian/prerm    "$PKGDIR/DEBIAN/prerm"
          cp packaging/debian/conffiles             "$PKGDIR/DEBIAN/conffiles"
          dpkg-deb --build "$PKGDIR" \
            "pping2_${VERSION}_ubuntu2404_${ARCH}.deb"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-ubuntu2404-${{ matrix.arch }}
          path: pping2_*.deb

  # macOS builds produce tar.gz only (no systemd/cron on macOS).
  # Intel (amd64) dropped — macos-13 runners are unreliable and Intel Macs are 6+ years old.
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install libtins
        run: brew install libtins

      - name: Set version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build pping2
        run: make LIBTINS="$(brew --prefix libtins)"

      - name: Build tarball
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          ARCH: ${{ matrix.arch }}
        run: |
          STAGING="pping2-${VERSION}-macos-${ARCH}"
          mkdir "$STAGING"
          cp pping2 Makefile README.md clickhouse.md LICENSE "$STAGING/"
          cp -r contrib "$STAGING/"
          tar czf "pping2-${VERSION}-macos-${ARCH}.tar.gz" "$STAGING"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: tarball-macos-${{ matrix.arch }}
          path: pping2-*-macos-*.tar.gz

  # Static musl build — drop-in binary for OpenWrt and other musl systems.
  # Statically links libtins, libpcap, and musl libc itself; no shared lib
  # deps and no PT_INTERP. Built inside an Alpine container via docker so
  # the host (checkout/cache/upload) stays on the standard glibc runner.
  build-musl-static:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cache static libtins
        id: cache-libtins-static
        uses: actions/cache@v4
        with:
          path: .libtins-static
          key: libtins-${{ env.LIBTINS_VERSION }}-alpine320-musl-static-${{ matrix.arch }}

      - name: Build libtins + pping2 inside Alpine
        env:
          LIBTINS_VERSION: ${{ env.LIBTINS_VERSION }}
        run: |
          export HOST_UID=$(id -u)
          export HOST_GID=$(id -g)
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -e LIBTINS_VERSION \
            -e HOST_UID \
            -e HOST_GID \
            alpine:3.20 sh -c '
              set -eux
              apk add --no-cache build-base cmake git pkgconf \
                  libpcap-dev linux-headers binutils file

              if [ ! -f .libtins-static/lib/libtins.a ]; then
                rm -rf .libtins-static
                git clone --depth=1 --branch "$LIBTINS_VERSION" \
                    https://github.com/mfontanini/libtins.git /tmp/libtins-src
                cmake -S /tmp/libtins-src -B /tmp/libtins-build \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DLIBTINS_BUILD_SHARED=0 \
                    -DLIBTINS_ENABLE_PCAP=1 \
                    -DCMAKE_INSTALL_PREFIX=/work/.libtins-static
                cmake --build /tmp/libtins-build --parallel "$(nproc)"
                cmake --install /tmp/libtins-build
              fi

              make STATIC=1 LIBTINS=/work/.libtins-static

              file pping2
              if readelf -l pping2 | grep -q INTERP; then
                echo "FAIL: binary has dynamic interpreter"
                readelf -l pping2 | grep -A1 INTERP
                exit 1
              fi
              if readelf -d pping2 | grep -q NEEDED; then
                echo "FAIL: binary has NEEDED entries"
                readelf -d pping2 | grep NEEDED
                exit 1
              fi
              echo "OK: fully static, no shared library deps"

              ./pping2 -h >/dev/null 2>&1 || true

              chown -R "$HOST_UID":"$HOST_GID" /work
            '

      - name: Build tarball
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          ARCH: ${{ matrix.arch }}
        run: |
          STAGING="pping2-${VERSION}-linux-${ARCH}-musl-static"
          mkdir "$STAGING"
          cp pping2 Makefile README.md clickhouse.md LICENSE "$STAGING/"
          cp -r contrib "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: tarball-musl-static-${{ matrix.arch }}
          path: pping2-*-linux-*-musl-static.tar.gz

  # publish blocks on all build legs — a failing build prevents any release.
  publish:
    needs: [build-debian, build-ubuntu, build-macos, build-musl-static]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        # github.ref_name is the tag (e.g. v1.0.0). Tags can legally contain
        # shell metacharacters — git-check-ref-format accepts `"`, `;`,
        # `$(...)`, `|`, backtick, `&`. ${{ ... }} substitution happens
        # before the shell parses the command, so a tag with those chars
        # would inject code at this step (which runs with `contents: write`
        # and an active GH_TOKEN). Bind the tag to a step-level env var so
        # the shell only ever sees "$TAG" as a quoted string. Same applies
        # to GITHUB_REPOSITORY (auto-provided by Actions; safe expansion).
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            pping2_*.deb \
            pping2-*-linux-*.tar.gz \
            pping2-*-macos-*.tar.gz
