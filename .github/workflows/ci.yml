name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

env:
  LIBTINS_VERSION: v4.5
  LIBTINS_PREFIX: ${{ github.workspace }}/.libtins

jobs:
  build:
    # Matrix on amd64 + arm64 so a regression in either build (e.g. the
    # aarch64 +crc march opt-in needed for __crc32cd) is caught at PR time,
    # not at release-tag time. The fail-fast: false keeps both arches
    # running so a failure in one doesn't hide failures in the other.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libpcap-dev libssl-dev pkg-config git ca-certificates

      - name: Cache libtins
        id: cache-libtins
        uses: actions/cache@v4
        with:
          path: .libtins
          key: libtins-${{ env.LIBTINS_VERSION }}-${{ matrix.runner }}

      - name: Build libtins (cache miss)
        if: steps.cache-libtins.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch "$LIBTINS_VERSION" \
            https://github.com/mfontanini/libtins.git /tmp/libtins-src
          cmake -S /tmp/libtins-src -B /tmp/libtins-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBTINS_ENABLE_PCAP=1 \
            -DCMAKE_INSTALL_PREFIX="$LIBTINS_PREFIX"
          cmake --build /tmp/libtins-build --parallel "$(nproc)"
          cmake --install /tmp/libtins-build

      - name: Build pping2
        run: make LIBTINS="$LIBTINS_PREFIX"

      - name: Upload pping2 binary
        uses: actions/upload-artifact@v4
        with:
          name: pping2-${{ matrix.arch }}-${{ github.sha }}
          path: pping2
          retention-days: 7

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install test deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libpcap-dev libssl-dev pkg-config

      - name: Restore libtins cache
        uses: actions/cache@v4
        with:
          path: .libtins
          key: libtins-${{ env.LIBTINS_VERSION }}-${{ matrix.runner }}

      - name: Download pping2 binary
        uses: actions/download-artifact@v4
        with:
          name: pping2-${{ matrix.arch }}-${{ github.sha }}

      - name: Make pping2 executable
        # touch bumps mtime so `make` treats the downloaded artifact as
        # up-to-date relative to the freshly-checked-out pping.cpp.
        run: |
          chmod +x pping2
          touch pping2

      - name: Run test suite via `make test`
        env:
          LD_LIBRARY_PATH: ${{ env.LIBTINS_PREFIX }}/lib
        run: make LIBTINS="$LIBTINS_PREFIX" test

  # Static musl build — smoke test the STATIC=1 path so a PR that breaks it
  # is caught here, not at the next release tag. Builds inside Alpine via
  # docker so checkout/cache/upload steps stay on the glibc runner. Only
  # aarch64 for now (the OpenWrt drop-in target); add amd64 here if/when
  # the amd64 musl tarball is added to release.yml.
  build-musl-static:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Cache static libtins
        id: cache-libtins-static
        uses: actions/cache@v4
        with:
          path: .libtins-static
          key: libtins-${{ env.LIBTINS_VERSION }}-alpine320-musl-static-aarch64

      - name: Build libtins + pping2 inside Alpine
        env:
          LIBTINS_VERSION: ${{ env.LIBTINS_VERSION }}
        run: |
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -e LIBTINS_VERSION \
            -e HOST_UID \
            -e HOST_GID \
            alpine:3.20 sh -c '
              set -eux
              apk add --no-cache build-base cmake git pkgconf \
                  libpcap-dev linux-headers binutils file

              if [ ! -f .libtins-static/lib/libtins.a ]; then
                rm -rf .libtins-static
                git clone --depth=1 --branch "$LIBTINS_VERSION" \
                    https://github.com/mfontanini/libtins.git /tmp/libtins-src
                cmake -S /tmp/libtins-src -B /tmp/libtins-build \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DLIBTINS_BUILD_SHARED=0 \
                    -DLIBTINS_ENABLE_PCAP=1 \
                    -DCMAKE_INSTALL_PREFIX=/work/.libtins-static
                cmake --build /tmp/libtins-build --parallel "$(nproc)"
                cmake --install /tmp/libtins-build
              fi

              make STATIC=1 LIBTINS=/work/.libtins-static

              # Prove the binary is actually static. PT_INTERP would point
              # at /lib/ld-musl-aarch64.so.1; a NEEDED entry would name a
              # .so. Either means the build silently fell back to dynamic.
              file pping2
              if readelf -l pping2 | grep -q INTERP; then
                echo "FAIL: binary has dynamic interpreter"
                readelf -l pping2 | grep -A1 INTERP
                exit 1
              fi
              if readelf -d pping2 | grep -q NEEDED; then
                echo "FAIL: binary has NEEDED entries"
                readelf -d pping2 | grep NEEDED
                exit 1
              fi
              echo "OK: fully static, no shared library deps"

              # Confirm the binary actually runs in a musl environment.
              ./pping2 -h >/dev/null 2>&1 || true

              # Hand ownership back to the runner uid so subsequent steps
              # (cache save, upload-artifact) can read everything.
              chown -R "$HOST_UID":"$HOST_GID" /work
            '

      - name: Upload static binary
        uses: actions/upload-artifact@v4
        with:
          name: pping2-musl-static-aarch64-${{ github.sha }}
          path: pping2
          retention-days: 7

  # Verify the Debian packaging end-to-end: stage install, assert file modes
  # and paths, build a .deb, install it, and check the postinst's runtime
  # effects (setcap, /etc/default/pping2 mode, /var/log/pping2 ownership).
  # Independent of the C++ build — uses a fake (empty) pping2 binary so
  # this catches packaging regressions on every PR without waiting for
  # libtins to compile.
  package-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev libcap2-bin shellcheck

      - name: shellcheck Debian maintainer scripts
        run: |
          shellcheck packaging/debian/postinst
          shellcheck packaging/debian/prerm

      - name: Stage install with a fake pping2 binary
        run: |
          : > pping2
          chmod +x pping2
          STAGE=$(mktemp -d)
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"
          make install-all DESTDIR="$STAGE" PREFIX=/usr SYSCONFDIR=/etc

      - name: Assert staged-tree modes and paths
        run: |
          set -eu
          fail=0
          chk() {
            mode="$1"; path="$2"
            if [ ! -e "$STAGE$path" ] && [ ! -L "$STAGE$path" ]; then
              echo "MISSING: $path"; fail=1; return
            fi
            got=$(stat -c '%a' "$STAGE$path")
            if [ "$got" != "$mode" ]; then
              echo "MODE MISMATCH: $path got=$got want=$mode"; fail=1
            else
              echo "OK $mode $path"
            fi
          }
          chk 755 /usr/bin/pping2
          chk 755 /usr/bin/pping2-load.sh
          chk 644 /etc/systemd/system/pping2.service
          chk 640 /etc/default/pping2
          chk 644 /etc/cron.d/pping2-load
          chk 644 /usr/share/pping2/schema.sql
          if [ -d "$STAGE/var/log/pping2" ]; then
            echo "OK dir /var/log/pping2"
          else
            echo "MISSING dir /var/log/pping2"; fail=1
          fi
          exit "$fail"

      - name: Build .deb from staged tree
        run: |
          set -eu
          mkdir "$STAGE/DEBIAN"
          sed \
            -e 's/^Version: .*/Version: 0.0.0-ci/' \
            -e 's/^Architecture: .*/Architecture: amd64/' \
            packaging/debian/control > "$STAGE/DEBIAN/control"
          install -m 0755 packaging/debian/postinst "$STAGE/DEBIAN/postinst"
          install -m 0755 packaging/debian/prerm    "$STAGE/DEBIAN/prerm"
          cp packaging/debian/conffiles             "$STAGE/DEBIAN/conffiles"
          # --root-owner-group forces root:root in the .deb metadata so the
          # smoke matches what release.yml (which builds inside debian:*
          # containers as root) produces. Without it dpkg-deb hints with
          # the runner-user uid/gid in the archive.
          dpkg-deb --root-owner-group --build "$STAGE" pping2-smoke.deb
          dpkg-deb --info pping2-smoke.deb
          dpkg-deb --contents pping2-smoke.deb

      - name: Install .deb and verify postinst runtime effects
        # apt resolves runtime deps (libpcap0.8t64, libstdc++6). dpkg-i alone
        # would fail dep resolution on a clean runner.
        run: |
          set -eu
          sudo apt-get install -y --no-install-recommends ./pping2-smoke.deb
          got=$(stat -c '%a' /etc/default/pping2)
          [ "$got" = "640" ] || { echo "FAIL: /etc/default/pping2 mode=$got (want 640)"; exit 1; }
          echo "OK /etc/default/pping2 mode=$got"
          getcap /usr/bin/pping2 | tee /tmp/getcap.out
          grep -q 'cap_net_raw' /tmp/getcap.out \
              || { echo "FAIL: cap_net_raw not set on /usr/bin/pping2"; exit 1; }
          echo "OK cap_net_raw applied"
          ls -ld /var/log/pping2
          ownr=$(stat -c '%U' /var/log/pping2)
          [ "$ownr" = "nobody" ] || { echo "FAIL: /var/log/pping2 owner=$ownr (want nobody)"; exit 1; }
          echo "OK /var/log/pping2 owner=$ownr"

      - name: Verify pping2.service hardening directives
        # Greps the installed unit file directly (decoupled from how
        # systemctl-show renders bitmasks across versions), then asks
        # systemd to resolve the unit so we know it actually parses.
        run: |
          set -eu
          systemctl cat pping2.service | tee /tmp/pping2.unit
          for prop in 'User=nobody' \
                      'AmbientCapabilities=CAP_NET_RAW' \
                      'CapabilityBoundingSet=CAP_NET_RAW' \
                      'NoNewPrivileges=true' \
                      'ProtectSystem=strict' \
                      'ProtectHome=true' \
                      'PrivateTmp=true' \
                      'ReadWritePaths=/var/log/pping2'; do
              grep -qE "^${prop}\$" /tmp/pping2.unit \
                  || { echo "FAIL: pping2.service missing ${prop}"; exit 1; }
              echo "OK pping2.service ${prop}"
          done
          # systemctl-show resolves the unit (parses + applies all defaults);
          # this is the round-trip that catches "directive name is misspelled
          # so systemd ignored it" — `cat` would still show the typo while
          # `show` would report the default value.
          resolved_user=$(systemctl show pping2.service --property=User --value)
          [ "$resolved_user" = "nobody" ] \
              || { echo "FAIL: systemd resolved User=$resolved_user (want nobody)"; exit 1; }
          echo "OK systemd resolved pping2.service User=$resolved_user"

      - name: Remove .deb (clean exit)
        if: always()
        run: sudo dpkg --remove pping2 || true
