name: Generate SEQ Goldens

on:
  workflow_dispatch:

env:
  LIBTINS_VERSION: v4.5
  LIBTINS_PREFIX: ${{ github.workspace }}/.libtins

jobs:
  gen-goldens:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libpcap-dev libssl-dev pkg-config git ca-certificates

      - name: Cache libtins
        id: cache-libtins
        uses: actions/cache@v4
        with:
          path: .libtins
          key: libtins-${{ env.LIBTINS_VERSION }}-ubuntu-24.04

      - name: Build libtins (cache miss)
        if: steps.cache-libtins.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch "$LIBTINS_VERSION" \
            https://github.com/mfontanini/libtins.git /tmp/libtins-src
          cmake -S /tmp/libtins-src -B /tmp/libtins-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBTINS_ENABLE_PCAP=1 \
            -DCMAKE_INSTALL_PREFIX="$LIBTINS_PREFIX"
          cmake --build /tmp/libtins-build --parallel "$(nproc)"
          cmake --install /tmp/libtins-build

      - name: Build pping2
        run: make LIBTINS="$LIBTINS_PREFIX"

      - name: Generate goldens
        env:
          LD_LIBRARY_PATH: ${{ env.LIBTINS_PREFIX }}/lib
        run: |
          mkdir -p test/golden
          for p in dns-tcp-linux dns-tcp-windows mixed-with-retx; do
            for m in ts seq hybrid; do
              ./pping2 -e --mode "$m" -r "test/pcaps/$p.pcap" > "test/golden/$p.$m.golden" 2>/dev/null
              echo "Generated $p.$m.golden ($(wc -l < test/golden/$p.$m.golden) lines)"
            done
          done

      - name: Upload goldens artifact
        uses: actions/upload-artifact@v4
        with:
          name: seq-goldens
          path: test/golden/*.golden
          retention-days: 1
